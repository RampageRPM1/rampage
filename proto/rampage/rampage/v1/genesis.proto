syntax = "proto3";
package rampage.rampage.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "rampage/rampage/v1/params.proto";

option go_package = "rampage/x/rampage/types";

// GenesisState defines the rampage module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
